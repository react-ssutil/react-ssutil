name: 💡 Feature Request
description: 새로운 훅이나 기능을 제안해주세요.
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        새로운 아이디어를 제안해주셔서 감사합니다!

  - type: checkboxes
    id: checklist
    attributes:
      label: 사전 확인
      options:
        - label: 기존 이슈에서 동일한 요청을 검색했습니다.
          required: true

  - type: textarea
    id: motivation
    attributes:
      label: 동기 / 문제 상황
      description: 어떤 문제를 해결하고 싶으신가요?
      placeholder: "~할 때 ~가 불편해서..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 훅이나 기능을 설명해주세요.
      render: tsx
      placeholder: |
        // 예시 API
        const { x, y } = useMousePosition();
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 현재 어떤 방법으로 해결하고 계신가요?
