name: 💡 Feature Request
description: Suggest a new hook or feature.
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea!

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and found no duplicate.
          required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem are you trying to solve?
      placeholder: "When I do X, it's annoying because..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: Describe the hook or feature you'd like.
      render: tsx
      placeholder: |
        // example usage
        const { x, y } = useMousePosition();
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: How are you currently working around this?
