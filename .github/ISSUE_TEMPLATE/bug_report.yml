name: 🐛 Bug Report
description: Found a bug? Let us know.
title: "[Bug]: "
labels: ["bug", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        The more detail you provide, the faster we can fix it.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight checklist
      options:
        - label: I am using the latest version of react-ssutil.
          required: true
        - label: I have searched existing issues and found no duplicate.
          required: true

  - type: input
    id: version
    attributes:
      label: react-ssutil version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: hook
    attributes:
      label: Affected hook(s)
      multiple: true
      options:
        - useDebounce
        - useThrottle
        - useBoolean
        - usePrevious
        - useLocalStorage
        - useOutsideClick
        - useMediaQuery
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code snippet that reproduces the issue.
      render: tsx
      placeholder: |
        import { useDebounce } from 'react-ssutil';

        function Example() {
          const debounced = useDebounce(() => {
            // ...
          }, 300);
        }
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 14 / Windows 11 / Ubuntu 22.04
        - Node.js: 20.x
        - React: 18.x
        - Framework: Next.js 14 / Vite + React / ...
        - Browser: Chrome 123

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or error logs here.
