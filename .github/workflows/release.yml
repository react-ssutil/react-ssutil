name: Release on Merge to Main

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event.pull_request.merged == true
    name: Create Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Parse PR body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const prTitle = context.payload.pull_request.title;

            // Extract version bump type
            const versionMatch = body.match(/###\s*Version bump[\s\S]*?```\s*(patch|minor|major)\s*```/i);
            const bumpType = versionMatch ? versionMatch[1].trim().toLowerCase() : 'patch';

            // Extract changelog entries
            const changelogMatch = body.match(/###\s*Changelog\s*\n([\s\S]*?)(?=\n##|$)/i);
            let changelogRaw = changelogMatch ? changelogMatch[1].trim() : '';

            // Filter out HTML comments and empty lines
            const changelogLines = changelogRaw
              .split('\n')
              .filter(line => !line.trim().startsWith('<!--') && line.trim() !== '-' && line.trim() !== '')
              .join('\n');

            const changelog = changelogLines.trim() || `- ${prTitle}`;

            core.setOutput('bump_type', bumpType);
            core.setOutput('changelog', changelog);
            core.setOutput('pr_title', prTitle);
            core.setOutput('pr_number', context.payload.pull_request.number);

            core.info(`Bump type: ${bumpType}`);
            core.info(`Changelog:\n${changelog}`);

      - name: Bump version
        id: version
        run: |
          BUMP_TYPE="${{ steps.parse.outputs.bump_type }}"
          CURRENT=$(node -p "require('./package.json').version")

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$BUMP_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "next=${NEXT}" >> $GITHUB_OUTPUT
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT

          # Update package.json version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEXT}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Version bumped: ${CURRENT} → ${NEXT}"

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          DATE=$(date +%Y-%m-%d)
          PR_NUMBER="${{ steps.parse.outputs.pr_number }}"
          PR_TITLE="${{ steps.parse.outputs.pr_title }}"
          CHANGELOG="${{ steps.parse.outputs.changelog }}"

          NEW_ENTRY="## [${VERSION}] - ${DATE}

          > PR #${PR_NUMBER} — ${PR_TITLE}

          ${CHANGELOG}
          "

          # Prepend new entry after the header block
          python3 - <<'PYEOF'
          import re

          with open('CHANGELOG.md', 'r') as f:
              content = f.read()

          version = "$VERSION"
          date = "$DATE"
          pr_number = "$PR_NUMBER"
          pr_title = "$PR_TITLE"
          changelog = """$CHANGELOG"""

          new_entry = f"""## [{version}] - {date}

          > PR #{pr_number} — {pr_title}

          {changelog}

          ---

          """

          # Insert after the header (first --- separator)
          if '---' in content:
              parts = content.split('---\n', 1)
              updated = parts[0] + '---\n\n' + new_entry + parts[1].lstrip()
          else:
              updated = content + '\n' + new_entry

          with open('CHANGELOG.md', 'w') as f:
              f.write(updated)
          PYEOF

      - name: Commit and tag
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.next }}';
            const prNumber = ${{ steps.parse.outputs.pr_number }};
            const prTitle = `${{ steps.parse.outputs.pr_title }}`;
            const changelog = `${{ steps.parse.outputs.changelog }}`;

            const body = `## What's Changed

            > PR #${prNumber} — ${prTitle}

            ${changelog}

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md`;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              body: body,
              draft: false,
              prerelease: false,
            });
